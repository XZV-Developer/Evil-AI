<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>CyberMind AI // Veo 3.1 Preview</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════
       CSS PERBAIKAN TOTAL (RESPONSIF SELULER FIRST)
       ══════════════════════════════════════════ */
    :root {
      --bg: #030a0e;
      --panel: #05121a;
      --accent: #00ffe7;
      --accent-rgb: 0, 255, 231;
      --warn: #ff003c;
      --text: #e0f2f1;
      --muted: #607d8b;
      --font-mono: 'Share Tech Mono', monospace;
      --font-main: 'Rajdhani', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { height: -webkit-fill-available; } /* Fix iOS safari vh issue */

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      height: 100vh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Scanline overlay - memperkuat Cyber feel */
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 231, 0.015) 2px, rgba(0, 255, 231, 0.015) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(var(--accent-rgb), 0.2);
      margin: 2%; /* Margin responsif */
      background: rgba(5, 18, 26, 0.85);
      backdrop-filter: blur(10px);
      position: relative;
    }

    header {
      padding: 10px 15px;
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 255, 231, 0.03);
    }

    .logo-text { font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; }
    .logo-text span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

    .clock { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); }

    /* PERBAIKAN TATA LETAK CONFIG - Responsif Total */
    .config-row {
      padding: 10px 15px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.1);
      display: flex;
      flex-direction: column; /* Baris di tumpuk vertikal di seluler */
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }

    /* Grup config individu agar sejajar */
    .config-group { display: flex; gap: 8px; align-items: center; width: 100%; }
    .cfg-label { color: var(--muted); min-width: 4.5rem; text-align: right; }

    input, select, textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      color: var(--text);
      padding: 6px 10px;
      outline: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      border-radius: 2px;
    }
    input[type="password"] { flex: 1; } /* Kunci API mengisi lebar */
    select { flex: 1; } /* Dropdown model mengisi lebar */

    .mode-tabs { display: flex; background: #02080c; border-bottom: 1px solid rgba(var(--accent-rgb), 0.1); }
    .tab {
      flex: 1; /* Tab mengisi lebar penuh */
      padding: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      border-right: 1px solid rgba(var(--accent-rgb), 0.1);
      transition: 0.3s;
      text-align: center;
    }
    .tab.active {
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.1);
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .main-panel { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding: 15px; }
    .main-panel.active { display: flex; }

    /* Penyesuaian Panel Veo khusus */
    #videoPanel { gap: 10px; }

    /* Kotak Pratinjau Video Responsif */
    .video-preview-wrap {
      width: 100%;
      aspect-ratio: 16/9; /* Proporsi standar */
      background: #000;
      border: 1px dashed var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .vid-placeholder { font-family: var(--font-mono); color: var(--muted); text-align: center; font-size: 0.8rem; line-height: 1.4; padding: 10px; }

    video { width: 100%; height: 100%; object-fit: contain; }

    /* Area Prompts Video */
    #videoPrompt { width: 100%; height: 6rem; resize: none; }

    /* Tombol Generasi Utama */
    .gen-btn {
      width: 100%;
      height: 2.8rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .gen-btn:hover { box-shadow: 0 0 15px var(--accent); }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    /* Tampilan Thinking/Loading */
    .thinking-dots span { animation: blink 1.4s infinite both; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

    /* Tampilan Chat Area (Disembunyikan di tab Video) */
    #chatPanel { display: none; }
    #chatWrap { display: flex; flex-direction: column; gap: 15px; }
    .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .msg-avatar { width: 30px; height: 30px; background: rgba(var(--accent-rgb), 0.1); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--accent); font-family: var(--font-mono); }
    .msg-body { flex: 1; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 2px; position: relative; font-size: 0.9rem; }
    .msg.user .msg-body { border-left: 2px solid var(--accent); }
    .msg.bot .msg-body { border-left: 2px solid var(--warn); }

    .input-row {
      padding: 10px 15px;
      display: flex;
      gap: 8px;
      background: #02080c;
      border-top: 1px solid rgba(var(--accent-rgb), 0.2);
    }
    #userInput { flex: 1; height: 3rem; }
    .send-btn { background: var(--accent); color: #000; border: none; padding: 0 15px; font-weight: 700; cursor: pointer; font-family: var(--font-main); border-radius: 2px; }

    /* Desktop View Adjustment */
    @media (min-width: 600px) {
      .config-row { flex-direction: row; gap: 15px; }
      .config-group { width: auto; flex: 1; }
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-text">CYBER<span>MIND</span></div>
    </div>
    <div id="clock" class="clock">00:00:00</div>
  </header>

  <div class="config-row">
    <div class="config-group">
      <span class="cfg-label">API_KEY:</span>
      <input type="password" id="apiKey" placeholder="sk-..." value="">
    </div>
    <div class="config-group">
      <span class="cfg-label">MODEL:</span>
      <select id="model">
        <option value="gemini/veo-3.1-generate-preview">Veo 3.1 Preview</option>
        <option value="vertex_ai/veo-001">Veo-001 (Vertex AI)</option>
        <option value="gemini/gemini-2.0-flash">Gemini 2.0 Flash (Chat)</option>
      </select>
    </div>
  </div>

  <div class="mode-tabs">
    <div class="tab active" id="tabVideo" onclick="switchTab('video')">🎬 VEO_GEN ENGINE</div>
    <div class="tab" id="tabChat" onclick="switchTab('chat')">💬 CHAT_TERMINAL</div>
  </div>

  <div id="videoPanel" class="main-panel active">
    <div class="video-preview-wrap" id="videoPreview">
      <div class="vid-placeholder">SYSTEM READY // ENGINE IDLE // Standby for video prompt input sequence...</div>
    </div>
    <textarea id="videoPrompt" placeholder="Deskripsikan video yang ingin di-generate. Contoh: Cinematic wide shot, cyberpunk city night view, rain reflecting neon lights on wet street, flying drone view, highly detailed, 8k resolution."></textarea>
    <button class="gen-btn" id="genVideoBtn" onclick="generateVideo()">EXECUTE VEO GENERATION SEQUENCE</button>
  </div>

  <div id="chatPanel" class="main-panel">
    <div id="chatWrap">
      <div class="vid-placeholder">// TERMINAL STANDBY FOR INSTRUCTIONS...</div>
    </div>
  </div>

  <div class="input-row" id="commonInput" style="display:none;">
    <textarea id="userInput" placeholder="Enter command or query..."></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
  </div>
</div>

<script>
  // ══════════════════════════════════════════
  // LOGIKA INTEGRASI VEO 3.1 (SINGKRON COLAB)
  // ══════════════════════════════════════════
  const API_URL = "https://litellm.koboi2026.biz.id/v1/chat/completions";
  let chatMessages = [];

  // Sinkronisasi Waktu
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  }, 1000);

  // Ganti Tab & Sinkronisasi Input UI
  function switchTab(mode) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(mode + 'Panel').classList.add('active');
    
    // Sembunyikan input chat jika di tab video
    document.getElementById('commonInput').style.display = (mode === 'video') ? 'none' : 'flex';
  }

  // 1. FUNGSI GENERATE VIDEO (VEO INTEGRATION)
  // Perbaikan total untuk menangani output non-streaming media
  async function generateVideo() {
    const prompt = document.getElementById('videoPrompt').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const preview = document.getElementById('videoPreview');
    const btn = document.getElementById('genVideoBtn');
    const model = document.getElementById('model').value;

    if (!prompt || !apiKey) return alert("API Key dan Prompt Video wajib diisi!");

    // UI Feedback: Loading
    btn.disabled = true;
    btn.textContent = "GENERATING SEQUENCE...";
    preview.innerHTML = `
      <div class="vid-placeholder">
        <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span><br>
        RENDERING NEURAL FRAMES (VEO ENGINE ACTIVE) // System processing request sequence...
      </div>`;

    try {
      // Periksa apakah model yang dipilih adalah Veo
      if (!model.includes('veo')) {
        throw new Error("Pilih model Veo yang valid untuk melakukan video generation.");
      }

      // Payload khusus untuk Veo (Non-Streaming)
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: model, // Gunakan model Veo yang dipilih
          messages: [
            { 
              role: "system", 
              content: "You are the Veo video generation engine. Work with neural rendering sequence. Output the direct resulting video URL clearly in your response, preferably in markdown format like [Video](URL)." 
            },
            { role: "user", content: "Generate video: " + prompt }
          ],
          // Untuk output media, matikan streaming agar kita dapat respons lengkap
          stream: false 
        })
      });

      const data = await response.json();
      
      // Deteksi error dari API (misal: API key salah)
      if (data.error) throw new Error(data.error.message || "API Error.");

      const content = data.choices[0].message.content;

      // Logika deteksi URL Video dari respon (mencari link .mp4 atau .webm)
      const urlMatch = content.match(/https?:\/\/[^\s]+\.(mp4|webm|mov)/gi);
      
      if (urlMatch) {
        // Render tag video responsif
        preview.innerHTML = `
          <video src="${urlMatch[0]}" controls autoplay loop>Browser not supporting video tag.</video>
          <div style="position:absolute; bottom:5px; right:5px; font-size:10px; color:var(--accent); background:rgba(0,0,0,0.5); padding:2px 5px; border-radius:2px; font-family:var(--font-mono);">
            VEO_SEQUENCE_SUCCESS [${model}]
          </div>`;
      } else {
        // Jika AI hanya memberi teks/deskripsi (proses rendering gagal)
        preview.innerHTML = `<div class="vid-placeholder">⚠ RENDER_FAIL: AI did not provide a media URL. Check system logs.<br><br>// Description: ${content}</div>`;
      }
    } catch (err) {
      // Tangani fatal error (koneksi terputus, API salah, dll)
      preview.innerHTML = `<div class="vid-placeholder" style="color:var(--warn)">FATAL_ERROR: ${err.message}<br><br>// Initialize system reset. Check config inputs.</div>`;
    } finally {
      // Kembalikan status tombol
      btn.disabled = false;
      btn.textContent = "EXECUTE VEO GENERATION SEQUENCE";
    }
  }

  // 2. FUNGSI CHAT (GEMINI 2.0 FLASH - Tambahan)
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const apiKey = document.getElementById('apiKey').value.trim();
    const prompt = input.value.trim();

    if (!prompt || !apiKey) return alert("API Key dan Prompt wajib diisi!");

    renderMessage('user', prompt);
    input.value = '';
    const botMsgId = renderMessage('bot', '...', true);

    chatMessages.push({ role: "user", content: prompt });

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "gemini/gemini-2.0-flash", // Tetap pakai gemini untuk chat
          messages: chatMessages,
          stream: true
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const dataStr = line.slice(6).trim();
            if (dataStr === '[DONE]') break;
            try {
              const json = JSON.parse(dataStr);
              const content = json.choices[0].delta.content || "";
              fullText += content;
              updateMessage(botMsgId, fullText);
            } catch (e) {}
          }
        }
      }
      chatMessages.push({ role: "assistant", content: fullText });
    } catch (err) {
      updateMessage(botMsgId, "ERROR: " + err.message);
    }
  }

  // HELPER UI: Render Message
  function renderMessage(role, text, isThinking = false) {
    const wrap = document.getElementById('chatWrap');
    if (wrap.querySelector('.vid-placeholder')) wrap.innerHTML = '';

    const id = 'msg-' + Date.now();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === 'user' ? 'USR' : 'SYS'}</div>
      <div class="msg-body">
        <div class="msg-text" id="${id}">${isThinking ? '<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>' : text}</div>
      </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return id;
  }

  // HELPER UI: Update Message Teks
  function updateMessage(id, text) {
    const el = document.getElementById(id);
    if (el) el.innerText = text;
  }
</script>

</body>
</html>
